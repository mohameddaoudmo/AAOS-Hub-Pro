<style>
  :root {

    color: var(--text);

  /* Animated background */

    inset: 0;

      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,0.06) 0%, transparent 60%),

    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 40px;
    border-bottom: 1px solid var(--border);
  }

  .header-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;

    color: var(--accent);
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    padding: 6px 16px;

    margin-bottom: 20px;

  }

  h1 {

    margin-top: 12px;
    animation: fadeDown 0.6s ease 0.2s both;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 30px;
    flex-wrap: wrap;
    animation: fadeDown 0.6s ease 0.3s both;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* CONTROLS */
  .controls {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(8,12,20,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }

  .search-wrap {
    max-width: 600px;
    margin: 0 auto 14px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
  }

  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 44px 12px 16px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: right;
  }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  .filter-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .tab {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab:hover { border-color: var(--accent); color: var(--accent); }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 5;
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* SECTION */
  .section {
    margin-bottom: 48px;
    animation: fadeUp 0.5s ease both;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .section-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }

  .section-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-right: auto;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .q-card:hover {
    border-color: rgba(0,212,255,0.3);
    transform: translateX(-2px);
  }

  .q-card.answered {
    border-color: rgba(16,185,129,0.3);
  }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    user-select: text; /* Enable copying */
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 2px;
    min-width: 38px;
    text-align: center;
  }

  .q-text {
    font-size: 0.95rem;
    line-height: 1.6;
    flex: 1;
    color: var(--text);
    direction: ltr !important;
    text-align: left !important;
    unicode-bidi: bidi-override !important;
  }

  .q-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }

  .q-card.answered .q-check {
    background: var(--accent4);
    border-color: var(--accent4);
    color: #000;
    font-size: 12px;
  }

  .q-expand {
    padding: 0 18px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }

  .q-card.open .q-expand {
    max-height: 600px;
    padding: 0 18px 16px;
  }

  .q-expand-inner {
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 14px 16px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text-muted);
    position: relative;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    margin-left: 10px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { background: rgba(0,212,255,0.1); }

  .mark-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--accent4);
    background: transparent;
    color: var(--accent4);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mark-btn:hover { background: rgba(16,185,129,0.1); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(8,12,20,0.95);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    white-space: nowrap;
  }

  .progress-info span { color: var(--accent); }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .reset-btn {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.8rem;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: #ef4444; color: #ef4444; }

  /* COUNT BADGE */
  #result-count {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace;
  }

  #result-count span { color: var(--accent); }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    display: none;
  }

  .no-results .icon { font-size: 3rem; margin-bottom: 12px; }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SCROLL TO TOP */
  #scroll-top {
    position: fixed;
    bottom: 70px;
    left: 20px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0;
    pointer-events: none;
    z-index: 99;
    font-size: 18px;
  }

  #scroll-top.visible { opacity: 1; pointer-events: all; }
  #scroll-top:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

// State
let answered = JSON.parse(localStorage.getItem('oop_answered') || '{}');
let currentFilter = 'all';
let searchQuery = '';

function saveAnswered() {
  localStorage.setItem('oop_answered', JSON.stringify(answered));
}

function renderAll() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  let shown = 0;
  let total = 0;
  let globalIdx = 0;

  SECTIONS.forEach(section => {
    const filtered = section.questions.filter(q => {
      const qText = typeof q === 'string' ? q : q.q;
      const matchFilter = currentFilter === 'all' || currentFilter === section.id;
      const matchSearch = !searchQuery || qText.toLowerCase().includes(searchQuery.toLowerCase());
      return matchFilter && matchSearch;
    });

    total += section.questions.length;

    if (filtered.length === 0) return;
    shown += filtered.length;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.dataset.section = section.id;
    sec.style.animationDelay = `${shown * 0.01}s`;

    const doneCount = filtered.filter(q => answered[getQKey(section.id, q)]).length;

    sec.innerHTML = `
      <div class="section-header">
        <div class="section-icon" style="background:${section.bg}; color:${section.color}">${section.icon}</div>
        <div class="section-title">${section.title}</div>
        <div class="section-count" style="background:${section.bg}; color:${section.color}; border:1px solid ${section.color}33">${doneCount}/${filtered.length}</div>
      </div>
    `;

    filtered.forEach((q, i) => {
      globalIdx++;
      const key = getQKey(section.id, q);
      const isDone = !!answered[key];
      const card = document.createElement('div');
      card.className = `q-card${isDone ? ' answered' : ''}`;
      card.dataset.key = key;
      card.innerHTML = `
        <div class="q-header" onclick="toggleCard(this.parentElement)">
          <div class="q-num">#${globalIdx.toString().padStart(3,'0')}</div>
          <div class="q-text">${typeof q === 'string' ? q : q.q}</div>
          <div class="q-check">${isDone ? '✓' : ''}</div>
        </div>
        <div class="q-expand">
          <div class="q-expand-inner">
            ${typeof q === 'string' 
              ? `💡 اكتب إجابتك على ورقة أو بصوت عالٍ، ثم ابحث عنها في الـ documentation أو Kotlin docs.<br><br>
                 إذا احتجت شرح كامل مع كود لهذا السؤال، اكتبه في المحادثة وسيتم شرحه بالتفصيل.`
              : `<div class="answer-box"><strong>الإجابة النموذجية:</strong><br>${q.a}</div>`
            }
            <br><br>
            <button class="mark-btn" onclick="toggleDone('${key}', event)">
              ${isDone ? '✅ تمت الإجابة' : '⬜ اضغط لتحديد كـ "تمت الإجابة"'}
            </button>
            <button class="copy-btn" onclick="copyText(this, \`${(typeof q === 'string' ? q : q.q).replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, event)">
              📋 نسخ السؤال
            </button>
          </div>
        </div>
      `;
      sec.appendChild(card);
    });

    container.appendChild(sec);
  });

  document.getElementById('shown').textContent = shown;
  document.getElementById('no-results').style.display = shown === 0 ? 'block' : 'none';

  updateProgress();
  updateHeaderStats();
}

function getQKey(sectionId, q) {
  const text = typeof q === 'string' ? q : q.q;
  return sectionId + ':' + text.substring(0, 40).replace(/[^a-zA-Z0-9]/g,'_');
}

function toggleCard(card) {
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.q-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function copyText(btn, text, e) {
  e.stopPropagation();
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.innerHTML;
    btn.innerHTML = '✅ تم النسخ!';
    setTimeout(() => { btn.innerHTML = original; }, 2000);
  });
}

function toggleDone(key, e) {
  e.stopPropagation();
  answered[key] = !answered[key];
  saveAnswered();
  renderAll();
}

function updateProgress() {
  let total = 0, done = 0;
  SECTIONS.forEach(s => {
    s.questions.forEach(q => {
      total++;
      if (answered[getQKey(s.id, q)]) done++;
    });
  });
  document.getElementById('prog-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = total > 0 ? (done/total*100)+'%' : '0%';
  document.getElementById('done-count').textContent = done;
}

function updateHeaderStats() {
  let total = 0;
  SECTIONS.forEach(s => total += s.questions.length);
  document.getElementById('total-count').textContent = total;
}

function resetProgress() {
  if (confirm('إعادة تعيين كل تقدمك؟')) {
    answered = {};
    saveAnswered();
    renderAll();
  }
}

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderAll();
});

// Filters
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAll();
  });
});

// Scroll top
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top');
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');
});

// Init
renderAll();
</script>
</body>
</html>
